<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada · Clinic</title>
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
.err{min-height:100vh;display:grid;place-items:center;text-align:center;padding:40px;
  background:radial-gradient(120% 90% at 80% 10%,var(--blush),transparent 55%),linear-gradient(180deg,var(--cream),var(--cream-2))}
.err__inner{max-width:560px}
.err__logo{width:96px;margin:0 auto 26px;filter:drop-shadow(0 8px 18px rgba(70,45,40,.18))}
.err h1{font-family:'Cormorant Garamond',serif;font-size:clamp(4rem,16vw,7rem);line-height:1;margin-bottom:6px}
.err h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,4vw,2rem);color:var(--mauve-deep);font-weight:600;margin-bottom:14px}
.err p{color:var(--muted);margin-bottom:30px;font-size:1.05rem}
</style>
</head>
<body>
<section class="err">
  <div class="err__inner">
    <img class="err__logo" src="/assets/img/logo-clinic.png" alt="Clinic — Estética & Saúde">
    <h1 class="gold-text">404</h1>
    <h2>Página não encontrada</h2>
    <p>O endereço que você procura não existe ou foi movido. Vamos te levar de volta ao seu sorriso.</p>
    <a class="btn btn--gold btn--lg" href="/">Voltar ao início</a>
  </div>
</section>
</body>
</html>
